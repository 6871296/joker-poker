on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  job:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - run: pip install --upgrade pip
    - run: python build.py
